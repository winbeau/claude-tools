  - code: zju
    name_cn: 浙江大学
    name_en: Zhejiang University
    departments:
      # person.zju.edu.cn/{cs,ai} 在 2026-05 都返回 404，旧入口已废。
      # 浙大 CS/AI 师资统一挂在计算机学院 csen 站点下：
      #  - 27003 = "教师名录"（全院 ~269 人，按所室分组：人工智能所/计算机软件所/...）
      #  - 27051 = "研究生导师/计算机科学与技术专业"（~82 人，6 页分页）
