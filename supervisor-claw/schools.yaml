# 7 所学校 × CS/AI 相关学院的入口配置
# 每个 department 都有 list_url（师资列表起点），有些有多个 list_url（按职称分页）

schools:
  - code: tsinghua
    name_cn: 清华大学
    name_en: Tsinghua University
    departments:
      - code: cs
        name_cn: 计算机系
        list_urls:
          - https://www.cs.tsinghua.edu.cn/szzk/jzgml.htm
      - code: iiis
        name_cn: 交叉信息研究院
        list_urls:
          - https://iiis.tsinghua.edu.cn/zh/faculty/
      - code: air
        name_cn: 智能产业研究院 AIR
        list_urls:
          - https://air.tsinghua.edu.cn/info/1046/1180.htm
      - code: au-ai
        name_cn: 自动化系（AI 方向）
        list_urls:
          - https://www.au.tsinghua.edu.cn/info/1108/3231.htm
      - code: ee-ai
        name_cn: 电子工程系（AI 方向）
        list_urls:
          - https://www.ee.tsinghua.edu.cn/szdw/jsml.htm

  - code: pku
    name_cn: 北京大学
    name_en: Peking University
    departments:
      # eecs (信息科学技术学院) 改组后，本科系下的"计算机学院"承接 CS 师资。
      # cs.pku.edu.cn/szdw/jyxl/amz/ALL.htm 是 "教研系列 - 按名字"，分 9 页。
      - code: eecs
        name_cn: 计算机学院 (原信息学院 CS 方向)
        list_urls:
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/1.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/2.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/3.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/4.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/5.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/6.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/7.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/8.htm
          - https://cs.pku.edu.cn/szdw/jyxl/amz/ALL/9.htm
      # 智能学院真正的入口是 cis.pku.edu.cn (ai.pku.edu.cn 是 AILab 旧站，已废)
      - code: ai
        name_cn: 智能学院
        list_urls:
          - https://www.cis.pku.edu.cn/szdw/zzjs.htm
          - https://www.cis.pku.edu.cn/szdw/zzjs/1.htm
          - https://www.cis.pku.edu.cn/szdw/zzjs/2.htm
          - https://www.cis.pku.edu.cn/szdw/zzjs/3.htm
          - https://www.cis.pku.edu.cn/szdw/zzjs/4.htm
      # 王选所站点是 www.icst.pku.edu.cn (www.wangxuan.pku.edu.cn 是纪念王选的 SPA)
      # 学术团队在 xstd/xstd_01/index.htm，分 2 页
      - code: wangxuan
        name_cn: 王选计算机研究所
        list_urls:
          - https://www.icst.pku.edu.cn/xstd/xstd_01/index.htm
          - https://www.icst.pku.edu.cn/xstd/xstd_01/index1.htm
      - code: cfcs
        name_cn: 前沿计算研究中心
        list_urls:
          - https://cfcs.pku.edu.cn/people/faculty/index.htm
          - https://cfcs.pku.edu.cn/people/directors/index.htm

  - code: nju
    name_cn: 南京大学
    name_en: Nanjing University
    departments:
      - code: cs
        name_cn: 计算机科学与技术系
        # /szdw/ landing page is broken (404) — use per-rank sub-pages instead.
        list_urls:
          - https://cs.nju.edu.cn/2639/listm.htm    # 教授
          - https://cs.nju.edu.cn/2640/listm.htm    # 副教授
          - https://cs.nju.edu.cn/zzp/listm.htm     # 准长聘
          - https://cs.nju.edu.cn/kxkbd/listm.htm   # 跨学科博导
          - https://cs.nju.edu.cn/2641/listm.htm    # 讲师 / 专职科研 / 博士后
      - code: ai
        name_cn: 人工智能学院
        list_urls:
          - https://ai.nju.edu.cn/people/list.htm
      - code: sw
        name_cn: 软件学院
        # /szll/index.htm is the school homepage; real faculty listing is one level deeper.
        list_urls:
          - https://software.nju.edu.cn/szll/szdw/index.html

  - code: ustc
    name_cn: 中国科学技术大学
    name_en: USTC
    departments:
      - code: cs
        name_cn: 计算机科学与技术学院
        # 教授 (js_23235, 32 人 / 2 页) + 副教授 (fjs_23239, 36 人 / 2 页)
        list_urls:
