          - https://eeis.ustc.edu.cn/2648/list2.htm
          - https://eeis.ustc.edu.cn/2648/list3.htm
          - https://eeis.ustc.edu.cn/2648/list4.htm
          - https://eeis.ustc.edu.cn/2648/list5.htm
          - https://eeis.ustc.edu.cn/2648/list6.htm
          - https://eeis.ustc.edu.cn/2648/list7.htm
          - https://eeis.ustc.edu.cn/2648/list8.htm
          - https://eeis.ustc.edu.cn/2615/list.htm
          - https://eeis.ustc.edu.cn/2615/list2.htm
          - https://eeis.ustc.edu.cn/2615/list3.htm
          - https://eeis.ustc.edu.cn/2615/list4.htm
          - https://eeis.ustc.edu.cn/2615/list5.htm
          - https://eeis.ustc.edu.cn/2615/list6.htm
          - https://eeis.ustc.edu.cn/2615/list7.htm

  - code: zju
    name_cn: 浙江大学
    name_en: Zhejiang University
    departments:
      # person.zju.edu.cn/{cs,ai} 在 2026-05 都返回 404，旧入口已废。
      # 浙大 CS/AI 师资统一挂在计算机学院 csen 站点下：
      #  - 27003 = "教师名录"（全院 ~269 人，按所室分组：人工智能所/计算机软件所/...）
      #  - 27051 = "研究生导师/计算机科学与技术专业"（~82 人，6 页分页）
      # cs 段与 ai-inst 段会有大量重叠老师 —— pipeline 按 (school,name,email) 去重。
      - code: cs
        name_cn: 计算机科学与技术学院
        list_urls:
          - http://www.cs.zju.edu.cn/csen/27051/list.htm
          - http://www.cs.zju.edu.cn/csen/27051/list2.htm
          - http://www.cs.zju.edu.cn/csen/27051/list3.htm
          - http://www.cs.zju.edu.cn/csen/27051/list4.htm
          - http://www.cs.zju.edu.cn/csen/27051/list5.htm
          - http://www.cs.zju.edu.cn/csen/27051/list6.htm
      - code: cadcg
        name_cn: CAD&CG 国家重点实验室
        list_urls:
          - http://www.cad.zju.edu.cn/talent-team
      - code: ai-inst
        name_cn: 人工智能研究所
        list_urls:
          - http://www.cs.zju.edu.cn/csen/27003/list.htm
      - code: sw
        name_cn: 软件学院
        list_urls:
          - http://www.cst.zju.edu.cn/szdw/list.htm

  - code: fudan
    name_cn: 复旦大学
    name_en: Fudan University
    departments:
      - code: cs
        name_cn: 计算机科学技术学院
        list_urls:
          - https://cs.fudan.edu.cn/szdw/szdwjs.htm
      - code: bd
        name_cn: 大数据学院
        list_urls:
          - https://sds.fudan.edu.cn/szdw/qzjs.htm
      - code: ai
        name_cn: 人工智能创新与产业研究院
        list_urls:
          - https://aiii.fudan.edu.cn/

  - code: sjtu
    name_cn: 上海交通大学
    name_en: SJTU
    departments:
      # cs.sjtu.edu.cn/PeopleList.aspx is gone — the new site renders 教师名录
      # via a POST AJAX endpoint that returns JSON wrapping the per-institute
      # HTML. The adapter accepts both the JSON envelope and the static shell.
      # v0.2 GET on the shell returns 0 faculty (data is JS-loaded); a future
      # fetcher upgrade should POST to /active/ajax_teacher_list.html with
      # page=1&cat_id=20&cat_code=jiaoshiml&type=1&zm=All&zc=全部 to populate.
      - code: cs
        name_cn: 计算机科学与工程系
        list_urls:
          - https://www.cs.sjtu.edu.cn/jiaoshiml.html
      # 电院 AI 方向 = sais.sjtu.edu.cn (自动化与感知学院, AI/robotics/control).
      # english.seiee.sjtu.edu.cn was an English landing page with no faculty
      # data. sais also uses the POST-AJAX JSON envelope (cat_id=18,
      # cat_code=faculty). parse_profile applies a 研究方向 AI-keyword filter.
      - code: see-ai
        name_cn: 自动化与感知学院（电院 AI 方向）
        list_urls:
          - https://sais.sjtu.edu.cn/faculty.html
      # AI 学院 真正的入口是 soai.sjtu.edu.cn/cn/faculty/zzjs
      # (sai.sjtu.edu.cn is an alias serving the same HTML).
      - code: ai
        name_cn: 人工智能学院
        list_urls:
          - https://soai.sjtu.edu.cn/cn/faculty/zzjs
      # qingyuan.sjtu.edu.cn (no www) doesn't resolve; the canonical domain
      # is www.qingyuan.sjtu.edu.cn. 全职教师 list ≈ 10 tenure-track members.
      - code: qingyuan
        name_cn: 清源研究院
        list_urls:
          - http://www.qingyuan.sjtu.edu.cn/c/quanzhijiaoshi.html
