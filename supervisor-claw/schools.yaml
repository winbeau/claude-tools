  - code: fudan
    name_cn: 复旦大学
    name_en: Fudan University
    departments:
      # 计算机科学技术学院 was merged into the broader "计算与智能创新学院"
      # in 2024 — the public site is cs.fudan.edu.cn. The 师资 page
      # /53161/list.htm (by 职称) is a sudy-CMS SPA whose teacher cards are
      # populated client-side from /_wp3services/generalQuery?queryObj=teacherHome.
      # That endpoint accepts GET with the same querystring as the in-page POST
      # and returns a single JSON payload covering all 288 entries — far
      # cleaner than scraping the SPA-rendered DOM (would need Playwright).
      # Adapter sniffs the JSON content-type and parses ``data[]`` directly.
      - code: cs
        name_cn: 计算与智能创新学院（含 CS + AI 双聘）
        list_urls:
          - https://cs.fudan.edu.cn/_wp3services/generalQuery?queryObj=teacherHome&siteId=577&pageIndex=1&rows=999&conditions=%5B%5D&orders=%5B%7B%22field%22%3A%22letter%22%2C%22type%22%3A%22asc%22%7D%5D&returnInfos=%5B%7B%22field%22%3A%22title%22%2C%22name%22%3A%22title%22%7D%2C%7B%22field%22%3A%22cnUrl%22%2C%22name%22%3A%22cnUrl%22%7D%2C%7B%22field%22%3A%22headerPic%22%2C%22name%22%3A%22headerPic%22%7D%2C%7B%22field%22%3A%22exField1%22%2C%22name%22%3A%22exField1%22%7D%2C%7B%22field%22%3A%22exField9%22%2C%22name%22%3A%22exField9%22%7D%2C%7B%22field%22%3A%22exField7%22%2C%22name%22%3A%22exField7%22%7D%2C%7B%22field%22%3A%22firstLetter%22%2C%22name%22%3A%22firstLetter%22%7D%2C%7B%22field%22%3A%22letter%22%2C%22name%22%3A%22letter%22%7D%2C%7B%22field%22%3A%22email%22%2C%22name%22%3A%22email%22%7D%2C%7B%22field%22%3A%22career%22%2C%22name%22%3A%22career%22%7D%5D&articleType=1&level=1
      # 大数据学院 (sds.fudan.edu.cn) is *not* a SPA. Each "rank" page is a
      # single inline <table> where every <tr> is one teacher (h4 + photo + bio).
      # 17428 = 教授/研究员；17429 = 副教授/副研究员. 17431 (博士后) shares the
      # template but rows are alumni with no profile_url — pipeline would
      # upsert them as no-link advisors, so we leave it out.
      - code: bd
        name_cn: 大数据学院
        list_urls:
          - https://sds.fudan.edu.cn/17428/list.htm
          - https://sds.fudan.edu.cn/17429/list.htm
      # 人工智能创新与产业研究院 (AI³) — note the correct host is ai3.fudan.edu.cn
      # (the v0.1 ``aiii.fudan.edu.cn`` doesn't resolve).
      - code: ai
        name_cn: 人工智能创新与产业研究院
        list_urls:
          - https://ai3.fudan.edu.cn/yjspy/dsdw.htm

  - code: sjtu
    name_cn: 上海交通大学
    name_en: SJTU
    departments:
      # cs.sjtu.edu.cn/jiaoshiml.html is the SPA shell — empty under GET.
      # Faculty data comes from a POST AJAX call returning JSON {tab_html,
      # content}. The adapter unwraps the JSON envelope automatically.
      # type=1 yields the rc-list (grouped by institute, all teachers in one
      # response). zm=All / zc=全部 disable the alphabetical / rank filters.
      - code: cs
        name_cn: 计算机科学与工程系
        list_urls:
          - url: https://www.cs.sjtu.edu.cn/active/ajax_teacher_list.html
            method: POST
            data:
              page: 1
              cat_id: '20'
              cat_code: jiaoshiml
              type: 1
              zm: All
              zc: 全部
              search: ''
            headers:
              X-Requested-With: XMLHttpRequest
              Referer: https://www.cs.sjtu.edu.cn/jiaoshiml.html
      # (v0.4.x 删除) 电院 AI 方向 sais.sjtu.edu.cn —— 用户判断与计算机相关度低、对
      # CS PhD 投递价值不大；cs.sjtu (~290) + ai (soai) + cse (网安) + qingyuan 合计已
      # 充足，所以把 see-ai 整段去掉避免 noise。如果以后要恢复，参考 git history。
      # AI 学院 真正的入口是 soai.sjtu.edu.cn/cn/faculty/zzjs
      # (sai.sjtu.edu.cn is an alias serving the same HTML).
      - code: ai
        name_cn: 人工智能学院
        list_urls:
          - https://soai.sjtu.edu.cn/cn/faculty/zzjs
      # qingyuan.sjtu.edu.cn (no www) doesn't resolve; the canonical domain
      # is www.qingyuan.sjtu.edu.cn. 全职教师 list ≈ 10 tenure-track members.
      - code: qingyuan
        name_cn: 清源研究院
        list_urls:
          - http://www.qingyuan.sjtu.edu.cn/c/quanzhijiaoshi.html
      # 网络空间安全学院 = infosec.sjtu.edu.cn (v0.4.1 add-on; missed in v0.4).
      # Directory.aspx is a static 67 KB single-page roster grouped by 职称.
      # ~75 PI total; ~5 senior PI cross-link to www.cs.sjtu.edu.cn —
      # adapter keeps those URLs absolute so they route to the cs.sjtu profile
      # parser. Profile pages: DirectoryDetail.aspx?id=<int>.
      - code: cse
        name_cn: 网络空间安全学院
        list_urls:
          - https://infosec.sjtu.edu.cn/Directory.aspx

  - code: shtech
    name_cn: 上海科技大学
    name_en: ShanghaiTech University
    departments:
      # 上海科技大学是 single-college 模型：CS / AI / EE / 通信全部归 SIST 一个
      # 学院管。sist.shanghaitech.edu.cn 是 Sudy-CMS SPA — 静态 /szdwx/list.htm
      # 是空壳，师资数据由 cs_search.js 通过 POST AJAX 拉
      # /_wp3services/generalQuery?queryObj=teacherHome 获得 (Fudan-cs 同款骨架)。
      # 师资分 6 个 exField8 桶：常任教授 / 特聘教授 / 访问教授 / 研究人员 /
      # 支撑人员 / 行政人员。PI 范围 = 前三类去掉访问教授 (默认隐藏)，再用
      # exField1 过滤 博士后 / 访问学者 / 学生 (在 adapter 里做)。
      # siteId=43 是 SIST 的 site；这套参数解出来 ~88 常任 + ~53 特聘 + ~6 研究人员
      # 共 ~147 个 PI，对一所小规模新型研究型大学已经覆盖完整。
      - code: sist
        name_cn: 信息科学与技术学院
        list_urls:
          # 常任教授 (tenure-track Professor / Associate / Assistant)
          - url: https://sist.shanghaitech.edu.cn/_wp3services/generalQuery?queryObj=teacherHome
            method: POST
            data:
              siteId: '43'
              columnId: ''
              conditions: '[{"field":"published","value":"1","judge":"="},{"field":"language","value":"1","judge":"="},{"field":"exField8","value":"常任教授","judge":"="}]'
              returnInfos: '[{"field":"title","name":"title"},{"field":"graduateSchool","name":"graduateSchool"},{"field":"degree","name":"degree"},{"field":"phone","name":"phone"},{"field":"email","name":"email"},{"field":"cnUrl","name":"cnUrl"},{"field":"headerPic","name":"headerPic"},{"field":"exField1","name":"exField1"},{"field":"exField5","name":"exField5"},{"field":"exField8","name":"exField8"},{"field":"exField9","name":"exField9"}]'
              orders: '[{"field":"siteSort","type":"asc"}]'
              pageIndex: '1'
              rows: '999'
              articleType: '1'
              level: '1'
            headers:
              X-Requested-With: XMLHttpRequest
              Referer: https://sist.shanghaitech.edu.cn/szdwx/list.htm?col=0
          # 特聘教授 (joint / honorary chair professors)
          - url: https://sist.shanghaitech.edu.cn/_wp3services/generalQuery?queryObj=teacherHome
            method: POST
            data:
              siteId: '43'
              columnId: ''
              conditions: '[{"field":"published","value":"1","judge":"="},{"field":"language","value":"1","judge":"="},{"field":"exField8","value":"特聘教授","judge":"="}]'
              returnInfos: '[{"field":"title","name":"title"},{"field":"graduateSchool","name":"graduateSchool"},{"field":"degree","name":"degree"},{"field":"phone","name":"phone"},{"field":"email","name":"email"},{"field":"cnUrl","name":"cnUrl"},{"field":"headerPic","name":"headerPic"},{"field":"exField1","name":"exField1"},{"field":"exField5","name":"exField5"},{"field":"exField8","name":"exField8"},{"field":"exField9","name":"exField9"}]'
              orders: '[{"field":"siteSort","type":"asc"}]'
              pageIndex: '1'
              rows: '999'
              articleType: '1'
              level: '1'
            headers:
              X-Requested-With: XMLHttpRequest
              Referer: https://sist.shanghaitech.edu.cn/szdwx/list.htm?col=1
          # 研究人员 (副研究员 / 助理研究员; adapter 过滤掉同桶里的 博士后)
          - url: https://sist.shanghaitech.edu.cn/_wp3services/generalQuery?queryObj=teacherHome
            method: POST
            data:
              siteId: '43'
              columnId: ''
              conditions: '[{"field":"published","value":"1","judge":"="},{"field":"language","value":"1","judge":"="},{"field":"exField8","value":"研究人员","judge":"="}]'
              returnInfos: '[{"field":"title","name":"title"},{"field":"graduateSchool","name":"graduateSchool"},{"field":"degree","name":"degree"},{"field":"phone","name":"phone"},{"field":"email","name":"email"},{"field":"cnUrl","name":"cnUrl"},{"field":"headerPic","name":"headerPic"},{"field":"exField1","name":"exField1"},{"field":"exField5","name":"exField5"},{"field":"exField8","name":"exField8"},{"field":"exField9","name":"exField9"}]'
              orders: '[{"field":"siteSort","type":"asc"}]'
              pageIndex: '1'
              rows: '999'
              articleType: '1'
              level: '1'
            headers:
              X-Requested-With: XMLHttpRequest
              Referer: https://sist.shanghaitech.edu.cn/szdwx/list.htm?col=3

